<!-- Open this in a browser to generate icons, then save them -->
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function draw(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  // Background
  ctx.fillStyle = '#4f46e5';
  ctx.fillRect(0, 0, size, size);
  // Text
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size * 0.35}px system-ui`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PPC', size/2, size/2);
}
draw('c192', 192);
draw('c512', 512);

// Auto-download
['c192','c512'].forEach(id => {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = id === 'c192' ? 'icon-192.png' : 'icon-512.png';
  a.textContent = 'Download ' + a.download;
  document.body.appendChild(a);
  document.body.appendChild(document.createElement('br'));
});
</script>
